name: Generate thumbnails

on:
  push:
    branches: [main]
    paths:
      - 'images/**'

jobs:
  thumbnails:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install ImageMagick
        run: sudo apt-get install -y imagemagick

      - name: Generate thumbnails
        run: |
          mkdir -p thumbnails
          for f in images/*; do
            [ -f "$f" ] || continue
            fname=$(basename "$f")
            ext="${fname##*.}"
            extlower=$(echo "$ext" | tr '[:upper:]' '[:lower:]')

            case "$extlower" in
              jpg|jpeg) ;;
              *) continue ;;
            esac

            if [ ! -f "thumbnails/$fname" ]; then
              convert "$f" -resize "800x800>" "thumbnails/$fname" -quality 75
            fi
          done

      - name: Commit thumbnails
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add thumbnails/
          git diff --staged --quiet || git commit -m "chore: generate thumbnails"
          git push